[project]
name = "compliance-advisor"
version = "1.3.0"
requires-python = ">=3.10"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = [
    "src",
    "src/functions",
]
addopts = "-ra -q --tb=short"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
ignore = ["E402"]

[tool.black]
line-length = 120
