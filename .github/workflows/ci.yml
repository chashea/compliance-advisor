name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff "black==25.11.0" mypy types-requests pytest httpx

      - name: Ruff lint
        run: ruff check .

      - name: Black format check
        run: black --check .

      - name: Mypy type check
        run: mypy --ignore-missing-imports --no-error-summary --explicit-package-bases src/ api.py sync.py init_db.py compliance_tools.py

      - name: Pytest
        run: pytest tests/ -v
