name: Deploy Compliance Advisor

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_compliance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r functions/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Unit tests
        run: pytest tests/ -m "not integration"

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_compliance
        run: pytest tests/ -m integration -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Type-check and build
        run: |
          cd frontend
          npm run build

      - name: Unit tests
        run: |
          cd frontend
          npm run test

  deploy-infra:
    needs: [test, test-frontend]
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      DEPLOYER_OBJECT_ID: ${{ secrets.DEPLOYER_OBJECT_ID }}
      ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
      ALLOWED_TENANT_IDS: ${{ secrets.ALLOWED_TENANT_IDS }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Bicep
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: az bicep build --file infra/main.bicep --outfile /tmp/azuredeploy.json

      - name: Fail if ENTRA_CLIENT_ID is not set
        if: env.ENTRA_CLIENT_ID == ''
        run: |
          echo "::error::ENTRA_CLIENT_ID is not set. EasyAuth would be disabled and the dashboard API would be open to the internet. Set the ENTRA_CLIENT_ID secret before deploying."
          exit 1

      - name: Warn if DEPLOYER_OBJECT_ID is not set
        if: env.DEPLOYER_OBJECT_ID == ''
        run: echo "::warning::DEPLOYER_OBJECT_ID is not set — Key Vault deployer access policy will be skipped."

      - name: Warn if ALLOWED_TENANT_IDS is not set
        if: env.ALLOWED_TENANT_IDS == ''
        run: echo "::warning::ALLOWED_TENANT_IDS is not set — ingestion tenant filtering will be disabled."

      - name: Infrastructure what-if
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
             --template-file infra/main.bicep \
             --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
                          deployerObjectId="$DEPLOYER_OBJECT_ID" \
                          entraClientId="$ENTRA_CLIENT_ID" \
                         allowedTenantIds="$ALLOWED_TENANT_IDS" \
                         postgresHaMode='${{ secrets.POSTGRES_HA_MODE || 'Disabled' }}' \
                         alertEmailAddress='${{ secrets.ALERT_EMAIL }}' \
                         ingestAudience='${{ secrets.INGEST_AUDIENCE }}' \
                         ingestExpectedAppId='${{ secrets.INGEST_EXPECTED_APPID }}'

      - name: Deploy infrastructure
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
             --template-file infra/main.bicep \
             --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
                          deployerObjectId="$DEPLOYER_OBJECT_ID" \
                          entraClientId="$ENTRA_CLIENT_ID" \
                         allowedTenantIds="$ALLOWED_TENANT_IDS" \
                         postgresHaMode='${{ secrets.POSTGRES_HA_MODE || 'Disabled' }}' \
                         alertEmailAddress='${{ secrets.ALERT_EMAIL }}' \
                         ingestAudience='${{ secrets.INGEST_AUDIENCE }}' \
                         ingestExpectedAppId='${{ secrets.INGEST_EXPECTED_APPID }}'

      - name: Skip infra deployment (missing secrets)
        if: env.AZURE_RESOURCE_GROUP == '' || env.POSTGRES_ADMIN_PASSWORD == ''
        run: |
          echo "::warning::Skipping infra deployment — AZURE_RESOURCE_GROUP or POSTGRES_ADMIN_PASSWORD is not set."

  deploy-functions:
    needs: [test, test-frontend, deploy-infra]
    runs-on: ubuntu-latest
    env:
      FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r functions/requirements.txt
          pip install --target functions/.python_packages/lib/site-packages -r functions/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install PostgreSQL client
        if: false  # Migrations now run via /api/admin/migrate (PG is private-network-only)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Warn if FUNCTION_APP_NAME is not set
        if: env.FUNCTION_APP_NAME == ''
        run: echo "::warning::FUNCTION_APP_NAME is not set — schema migration and deployment will be skipped."

      - name: Bundle schema migrations with function package
        run: |
          mkdir -p functions/sql
          cp -r sql/migrations functions/sql/migrations

      - name: Clear WEBSITE_RUN_FROM_PACKAGE URL
        if: env.FUNCTION_APP_NAME != '' && env.AZURE_RESOURCE_GROUP != ''
        run: |
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1

      - name: Bundle collector package
        run: cp -r collector/ functions/collector/

      - name: Deploy Azure Functions to staging slot
        if: env.FUNCTION_APP_NAME != ''
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          slot-name: staging
          package: functions/

      - name: Run schema migration via staging admin endpoint
        if: env.FUNCTION_APP_NAME != ''
        run: |
          echo "Waiting 30s for staging deployment to stabilize..."
          sleep 30
          KEY=$(az functionapp keys list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" --slot staging \
            --query "functionKeys.default" -o tsv)
          curl -fsS "https://${FUNCTION_APP_NAME}-staging.azurewebsites.net/api/admin/migrate?code=${KEY}" \
            -X POST -H "Content-Type: application/json" -d '{}' \
            --max-time 120 --retry 3 --retry-delay 10

      - name: Smoke test staging slot
        if: env.FUNCTION_APP_NAME != ''
        run: |
          echo "Probing staging /api/health/deep..."
          # Up to 5 attempts; deep probe checks DB + Key Vault + OpenAI.
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              "https://${FUNCTION_APP_NAME}-staging.azurewebsites.net/api/health/deep" \
              --max-time 60) || true
            echo "attempt=$i status=$HTTP"
            cat /tmp/health.json
            echo
            if [ "$HTTP" = "200" ]; then
              echo "Staging is healthy — proceeding to swap."
              exit 0
            fi
            sleep 15
          done
          echo "::error::Staging slot failed health check; aborting swap to production."
          exit 1

      - name: Swap staging into production
        if: env.FUNCTION_APP_NAME != ''
        run: |
          az functionapp deployment slot swap \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$FUNCTION_APP_NAME" \
            --slot staging --target-slot production
          echo "Swapped staging → production"

      - name: Production health check
        if: env.FUNCTION_APP_NAME != ''
        run: |
          sleep 15
          curl -sf "https://${FUNCTION_APP_NAME}.azurewebsites.net/api/health" \
            --max-time 30 --retry 3 --retry-delay 10

  deploy-frontend:
    needs: [test, test-frontend, deploy-infra]
    runs-on: ubuntu-latest
    env:
      WEB_APP_NAME: ${{ vars.WEB_APP_NAME }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        if: env.WEB_APP_NAME != ''
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}

      - name: Azure Login (OIDC)
        if: env.WEB_APP_NAME != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        if: env.WEB_APP_NAME != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: frontend/dist/

      - name: Skip frontend deployment (missing secrets)
        if: env.WEB_APP_NAME == ''
        run: echo "Skipping frontend deployment; WEB_APP_NAME is not set."
