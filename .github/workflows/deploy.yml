name: Deploy Compliance Advisor

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r functions/requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest tests/

  deploy-infra:
    needs: test
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: rg-compliance-advisor
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      DEPLOYER_OBJECT_ID: ${{ secrets.DEPLOYER_OBJECT_ID }}
      ENTRA_CLIENT_ID: ${{ secrets.ENTRA_CLIENT_ID }}
      ALLOWED_TENANT_IDS: ${{ secrets.ALLOWED_TENANT_IDS }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: 91df91cb-c2e4-4c09-83ef-0f35bb730ce6
          tenant-id: 119e9fe0-c9d3-4a9d-be8b-c82d03fd0cd4
          subscription-id: 2a71b66d-0453-47ed-a081-b0863b91a2e0

      - name: Build Bicep
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: az bicep build --file infra/main.bicep --outfile /tmp/azuredeploy.json

      - name: Warn if ENTRA_CLIENT_ID is not set
        if: env.ENTRA_CLIENT_ID == ''
        run: echo "::warning::ENTRA_CLIENT_ID is not set — EasyAuth will not be enabled on the Function App. API endpoints are unauthenticated."

      - name: Warn if DEPLOYER_OBJECT_ID is not set
        if: env.DEPLOYER_OBJECT_ID == ''
        run: echo "::warning::DEPLOYER_OBJECT_ID is not set — Key Vault deployer access policy will be skipped."

      - name: Warn if ALLOWED_TENANT_IDS is not set
        if: env.ALLOWED_TENANT_IDS == ''
        run: echo "::warning::ALLOWED_TENANT_IDS is not set — ingestion tenant filtering will be disabled."

      - name: Infrastructure what-if
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: |
          az deployment group what-if \
            --resource-group "$AZURE_RESOURCE_GROUP" \
             --template-file infra/main.bicep \
             --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
                          deployerObjectId="$DEPLOYER_OBJECT_ID" \
                          entraClientId="$ENTRA_CLIENT_ID" \
                         allowedTenantIds="$ALLOWED_TENANT_IDS"

      - name: Deploy infrastructure
        if: env.AZURE_RESOURCE_GROUP != '' && env.POSTGRES_ADMIN_PASSWORD != ''
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
             --template-file infra/main.bicep \
             --parameters postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
                          deployerObjectId="$DEPLOYER_OBJECT_ID" \
                          entraClientId="$ENTRA_CLIENT_ID" \
                         allowedTenantIds="$ALLOWED_TENANT_IDS"

      - name: Skip infra deployment (missing secrets)
        if: env.AZURE_RESOURCE_GROUP == '' || env.POSTGRES_ADMIN_PASSWORD == ''
        run: |
          echo "::warning::Skipping infra deployment — AZURE_RESOURCE_GROUP or POSTGRES_ADMIN_PASSWORD is not set."

  deploy-functions:
    needs: [test, deploy-infra]
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      FUNCTION_APP_NAME: cadvisor-func-prod
      AZURE_RESOURCE_GROUP: rg-compliance-advisor
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r functions/requirements.txt
          pip install --target functions/.python_packages/lib/site-packages -r functions/requirements.txt

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: 91df91cb-c2e4-4c09-83ef-0f35bb730ce6
          tenant-id: 119e9fe0-c9d3-4a9d-be8b-c82d03fd0cd4
          subscription-id: 2a71b66d-0453-47ed-a081-b0863b91a2e0

      - name: Install PostgreSQL client
        if: env.DATABASE_URL != ''
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Warn if DATABASE_URL is not set
        if: env.DATABASE_URL == ''
        run: echo "::warning::DATABASE_URL is not set — schema migration and deployment will be skipped."

      - name: Run schema migration
        if: env.DATABASE_URL != ''
        run: psql "$DATABASE_URL" -f sql/schema.sql

      - name: Clear WEBSITE_RUN_FROM_PACKAGE URL
        if: env.FUNCTION_APP_NAME != '' && env.AZURE_RESOURCE_GROUP != ''
        run: |
          az functionapp config appsettings set \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings WEBSITE_RUN_FROM_PACKAGE=1

      - name: Bundle collector package
        run: cp -r collector/ functions/collector/

      - name: Deploy Azure Functions
        if: env.FUNCTION_APP_NAME != ''
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.FUNCTION_APP_NAME }}
          package: functions/

      - name: Health check
        if: env.FUNCTION_APP_NAME != ''
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          curl -sf https://cadvisor-func-prod.azurewebsites.net/api/advisor/status \
            -X POST -H "Content-Type: application/json" -d '{}' \
            --max-time 30 --retry 3 --retry-delay 10

  deploy-frontend:
    needs: [test, deploy-infra]
    runs-on: ubuntu-latest
    env:
      WEB_APP_NAME: cadvisor-web-prod
      VITE_API_BASE_URL: https://cadvisor-func-prod.azurewebsites.net
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        if: env.WEB_APP_NAME != ''
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}

      - name: Azure Login (OIDC)
        if: env.WEB_APP_NAME != ''
        uses: azure/login@v2
        with:
          client-id: 91df91cb-c2e4-4c09-83ef-0f35bb730ce6
          tenant-id: 119e9fe0-c9d3-4a9d-be8b-c82d03fd0cd4
          subscription-id: 2a71b66d-0453-47ed-a081-b0863b91a2e0

      - name: Deploy to Azure Web App
        if: env.WEB_APP_NAME != ''
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEB_APP_NAME }}
          package: frontend/dist/

      - name: Skip frontend deployment (missing secrets)
        if: env.WEB_APP_NAME == ''
        run: echo "Skipping frontend deployment; WEB_APP_NAME is not set."
